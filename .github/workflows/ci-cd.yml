name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd app
          npm install

      # 🔹 LINT
      - name: Run Lint
        run: |
          cd app
          npm run lint || echo "No lint configured"

      # 🔹 TEST
      - name: Run Tests
        run: |
          cd app
          npm test || echo "No tests configured"

      # 🔹 BUILD DOCKER IMAGE
      - name: Build Docker Image
        run: docker build -t devops-app .

      # 🔹 DEPLOY (Basic - run container)
      - name: Run Container (Deploy Step)
        run: |
          docker run -d -p 3000:3000 devops-app